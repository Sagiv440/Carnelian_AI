<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carnelian — Docs</title>
<meta name="description" content="Documentation for Carnelian, the local-first AI workspace for Windows & Linux." />
<link rel="icon" href="../app-logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#1c1d20; --bg2:#161719; --titlebar:#21272d;
  --surface:#25262b; --surface2:#2c2d33; --input:#2a2b30;
  --line:rgba(255,255,255,.085); --line2:rgba(255,255,255,.16);
  --text:#e9e9ec; --dim:#abaeb4; --mute:#7c7f86;
  --accent:#f2542d; --accent2:#ff6a44; --green:#3fb950;
  --ui:'Poppins',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
  --r:4px; --ease:cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--ui);background:var(--bg);color:var(--text);line-height:1.65;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#fff}
a{color:inherit;text-decoration:none}
.wrap{max-width:1160px;margin:0 auto;padding:0 28px}

/* ---------- NAV (matches landing) ---------- */
nav{position:sticky;top:0;z-index:50;background:rgba(28,29,32,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:62px}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:19px;letter-spacing:-.2px}
.brand img{width:26px;height:26px}
.brand .ver{font-family:var(--mono);font-size:11px;color:var(--mute);font-weight:400;margin-left:2px}
.nav-links{display:flex;align-items:center;gap:28px}
.nav-links a{font-size:14px;color:var(--dim);font-weight:500;transition:color .15s}
.nav-links a:hover,.nav-links a.on{color:var(--text)}
.nav-cta{padding:8px 15px;border:1px solid var(--accent);color:#fff;background:var(--accent);border-radius:var(--r);font-size:13px;font-weight:500;transition:background .15s}
.nav-cta:hover{background:var(--accent2)}
.burger{display:none;background:none;border:1px solid var(--line2);color:var(--text);width:40px;height:36px;border-radius:var(--r);font-size:17px;cursor:pointer}

/* ---------- DOCS LAYOUT ---------- */
.docs{display:grid;grid-template-columns:248px 1fr;gap:44px;align-items:start;padding:38px 0 90px}

/* sidebar */
.sidebar{position:sticky;top:90px;align-self:start}
.sb-group{margin-bottom:22px}
.sb-group .gh{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mute);margin-bottom:9px}
.sb-link{display:block;font-size:14px;color:var(--dim);padding:6px 10px;border-radius:var(--r);border-left:2px solid transparent;transition:color .15s,background .15s}
.sb-link:hover{color:var(--text);background:var(--surface)}
.sb-link.on{color:var(--text);background:var(--surface2);border-left-color:var(--accent)}

/* content */
.content{min-width:0}
.crumb{font-family:var(--mono);font-size:11.5px;letter-spacing:1px;color:var(--mute);text-transform:uppercase;margin-bottom:12px}
.content h1{font-weight:700;font-size:clamp(28px,4vw,40px);letter-spacing:-.8px;line-height:1.1;margin-bottom:8px}
.content .summary{font-size:16.5px;color:var(--dim);margin-bottom:30px}
.content h2{font-weight:600;font-size:22px;letter-spacing:-.3px;margin:36px 0 12px;padding-top:6px}
.content h3{font-weight:600;font-size:17px;margin:26px 0 8px}
.content p{font-size:15.5px;color:var(--dim);margin-bottom:14px}
.content p b,.content li b{color:var(--text);font-weight:600}
.content a.link{color:var(--accent);border-bottom:1px solid rgba(242,84,45,.4)}
.content a.link:hover{border-bottom-color:var(--accent)}
.content ul,.content ol{margin:0 0 16px 4px;padding-left:22px}
.content li{font-size:15.5px;color:var(--dim);margin-bottom:7px}
.content code.inline{font-family:var(--mono);font-size:.88em;background:var(--surface2);border:1px solid var(--line);border-radius:3px;padding:1px 6px;color:var(--text)}
.codeblock{background:#131416;border:1px solid var(--line2);border-radius:6px;overflow:hidden;margin:0 0 18px}
.codeblock .cb-bar{padding:7px 13px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--mute);display:flex;justify-content:space-between}
.codeblock .cb-copy{cursor:pointer;color:var(--mute);transition:color .15s}
.codeblock .cb-copy:hover{color:var(--text)}
.codeblock pre{margin:0;padding:15px;overflow-x:auto}
.codeblock code{font-family:var(--mono);font-size:13px;color:var(--text);line-height:1.7}
.note{border:1px solid var(--line2);border-left:3px solid var(--accent);background:var(--surface);border-radius:var(--r);padding:13px 16px;margin:0 0 18px;font-size:14.5px;color:var(--dim)}
.note::before{content:"NOTE";font-family:var(--mono);font-size:10px;letter-spacing:1.5px;color:var(--accent);display:block;margin-bottom:5px}
.pager{display:flex;justify-content:space-between;gap:14px;margin-top:54px;padding-top:24px;border-top:1px solid var(--line)}
.pager a{flex:1;border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;background:var(--surface);transition:border-color .15s,background .15s}
.pager a:hover{border-color:var(--accent);background:var(--surface2)}
.pager .dir{font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--mute);margin-bottom:4px}
.pager .ttl{font-size:14.5px;font-weight:500;color:var(--text)}
.pager a.next{text-align:right}
.pager .ph{flex:1}

@media(max-width:880px){
  .nav-links{display:none}.burger{display:block}
  .nav-links.open{display:flex;position:absolute;top:62px;left:0;right:0;flex-direction:column;background:var(--bg2);border-bottom:1px solid var(--line);padding:8px 28px 16px}
  .nav-links.open a{padding:11px 0;border-bottom:1px solid var(--line)}
  .docs{grid-template-columns:1fr;gap:24px}
  .sidebar{position:static;border:1px solid var(--line);border-radius:var(--r);padding:14px;background:var(--bg2)}
}
</style>
</head>
<body>

<nav>
  <div class="wrap nav-in">
    <a href="../index.html" class="brand"><img src="../app-logo.png" alt="Carnelian" /> Carnelian <span class="ver" id="ver"></span></a>
    <div class="nav-links" id="navlinks">
      <a href="../index.html#modes">Modes</a>
      <a href="../index.html#features">Features</a>
      <a href="index.html" class="on">Docs</a>
      <a class="nav-cta" href="../index.html#download">Download</a>
    </div>
    <button class="burger" id="burger" aria-label="Menu">≡</button>
  </div>
</nav>

<div class="wrap docs">
  <aside class="sidebar" id="sidebar"><!-- nav rendered from content.json --></aside>
  <main class="content" id="content"><!-- page rendered from content.json --></main>
</div>

<script>
const burger=document.getElementById('burger'),links=document.getElementById('navlinks');
burger.addEventListener('click',()=>links.classList.toggle('open'));

const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
// minimal inline markdown: **bold**, `code`, [text](url)
function inline(s){
  let t=esc(s);
  t=t.replace(/`([^`]+)`/g,(m,c)=>'<code class="inline">'+c+'</code>');
  t=t.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  t=t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a class="link" href="$2">$1</a>');
  return t;
}
function renderSection(sec){
  switch(sec.type){
    case 'h2': return '<h2 id="'+slug(sec.text)+'">'+esc(sec.text)+'</h2>';
    case 'h3': return '<h3>'+esc(sec.text)+'</h3>';
    case 'p':  return '<p>'+inline(sec.text)+'</p>';
    case 'ul': return '<ul>'+sec.items.map(i=>'<li>'+inline(i)+'</li>').join('')+'</ul>';
    case 'ol': return '<ol>'+sec.items.map(i=>'<li>'+inline(i)+'</li>').join('')+'</ol>';
    case 'note': return '<div class="note">'+inline(sec.text)+'</div>';
    case 'code': return '<div class="codeblock"><div class="cb-bar"><span>'+esc(sec.lang||'code')+'</span><span class="cb-copy" data-code="'+encodeURIComponent(sec.text)+'">copy</span></div><pre><code>'+esc(sec.text)+'</code></pre></div>';
    default: return '';
  }
}
const slug=s=>s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');

let DOCS=null;
function renderSidebar(){
  const groups=[];
  DOCS.pages.forEach(p=>{
    let g=groups.find(x=>x.name===p.group);
    if(!g){g={name:p.group,pages:[]};groups.push(g);}
    g.pages.push(p);
  });
  document.getElementById('sidebar').innerHTML=groups.map(g=>
    '<div class="sb-group"><div class="gh">'+esc(g.name)+'</div>'+
    g.pages.map(p=>'<a class="sb-link" data-id="'+p.id+'" href="#'+p.id+'">'+esc(p.title)+'</a>').join('')+
    '</div>').join('');
}
function renderPage(id){
  const idx=Math.max(0,DOCS.pages.findIndex(p=>p.id===id));
  const page=DOCS.pages[idx];
  document.title='Carnelian — '+page.title;
  document.querySelectorAll('.sb-link').forEach(a=>a.classList.toggle('on',a.dataset.id===page.id));
  const prev=DOCS.pages[idx-1],next=DOCS.pages[idx+1];
  document.getElementById('content').innerHTML=
    '<div class="crumb">'+esc(page.group)+'</div>'+
    '<h1>'+esc(page.title)+'</h1>'+
    (page.summary?'<p class="summary">'+inline(page.summary)+'</p>':'')+
    page.sections.map(renderSection).join('')+
    '<div class="pager">'+
      (prev?'<a class="prev" href="#'+prev.id+'"><div class="dir">← Previous</div><div class="ttl">'+esc(prev.title)+'</div></a>':'<span class="ph"></span>')+
      (next?'<a class="next" href="#'+next.id+'"><div class="dir">Next →</div><div class="ttl">'+esc(next.title)+'</div></a>':'<span class="ph"></span>')+
    '</div>';
  window.scrollTo(0,0);
}
function route(){
  const id=(location.hash||'').replace(/^#/,'')||DOCS.pages[0].id;
  renderPage(id);
}
document.addEventListener('click',e=>{
  const c=e.target.closest('.cb-copy');
  if(c){navigator.clipboard.writeText(decodeURIComponent(c.dataset.code));const o=c.textContent;c.textContent='copied';setTimeout(()=>c.textContent=o,1200);}
});
window.addEventListener('hashchange',route);

fetch('content.json').then(r=>r.json()).then(data=>{
  DOCS=data;
  document.getElementById('ver').textContent=data.site.version||'';
  renderSidebar();
  route();
}).catch(err=>{
  document.getElementById('content').innerHTML='<h1>Docs unavailable</h1><p>Could not load <code class="inline">content.json</code>. If you opened this file directly from disk, serve it over http (e.g. <code class="inline">python3 -m http.server</code>) — browsers block fetch on <code class="inline">file://</code>.</p>';
});
</script>
</body>
</html>
